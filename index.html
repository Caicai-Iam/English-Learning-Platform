<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Learning Platform</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        :root {
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f5;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --border-color: #e0e0e0;
            --accent-color: #4a90e2;
            --accent-light: #e8f1ff;
            --success: #27ae60;
            --error: #e74c3c;
        }

        html.dark {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --border-color: #444444;
            --accent-color: #6ba3f5;
            --accent-light: #1e3a5f;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s;
        }

        .app-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid var(--border-color);
            background-color: var(--bg-secondary);
        }

        .header-left h1 {
            font-size: 28px;
            font-weight: 600;
            color: var(--accent-color);
        }

        .theme-toggle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--accent-light);
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .app-main {
            flex: 1;
            padding: 40px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .container {
            background-color: var(--bg-secondary);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .container-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .container-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .text-input {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: inherit;
            resize: vertical;
            margin-bottom: 20px;
        }

        .text-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .controls-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .control-group label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        select {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 14px;
        }

        .btn {
            padding: 12px 24px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn:hover {
            background-color: #3a7bc8;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background-color: var(--border-color);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            background-color: var(--text-secondary);
        }

        .btn-success {
            background-color: var(--success);
        }

        .btn-success:hover {
            background-color: #229954;
        }

        .status {
            text-align: center;
            font-size: 14px;
            color: var(--text-secondary);
            margin-top: 10px;
        }

        .status.loading {
            color: var(--accent-color);
        }

        .status.error {
            color: var(--error);
        }

        .status.success {
            color: var(--success);
        }

        .player-section {
            display: none;
        }

        .player-section.active {
            display: block;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .play-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: var(--accent-color);
            color: white;
            border: none;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            flex-shrink: 0;
        }

        .play-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.4);
        }

        .progress-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .time-display {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .progress-bar {
            width: 100%;
            height: 6px;
            cursor: pointer;
            -webkit-appearance: none;
            appearance: none;
            background: var(--border-color);
            border-radius: 3px;
            outline: none;
        }

        .progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            background-color: var(--accent-color);
            border-radius: 50%;
            cursor: pointer;
        }

        .progress-bar::-moz-range-thumb {
            width: 14px;
            height: 14px;
            background-color: var(--accent-color);
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .playback-options {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 14px;
        }

        .mode-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .mode-tab {
            padding: 8px 16px;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
        }

        .mode-tab.active {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        .display-content {
            background-color: var(--bg-primary);
            border-radius: 8px;
            padding: 20px;
            min-height: 200px;
        }

        .sentence-text {
            font-size: 18px;
            line-height: 1.8;
            margin-bottom: 20px;
            text-align: center;
        }

        .word-item {
            display: inline-block;
            padding: 6px 12px;
            margin: 4px;
            background-color: var(--accent-light);
            border: 1px solid var(--accent-color);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            user-select: none;
        }

        .word-item:hover {
            background-color: var(--accent-color);
            color: white;
        }

        .word-item.selected {
            background-color: var(--accent-color);
            color: white;
        }

        .dictation-item {
            margin-bottom: 20px;
            padding: 16px;
            background-color: var(--bg-secondary);
            border-radius: 8px;
            border-left: 4px solid var(--border-color);
        }

        .dictation-item.current {
            border-left-color: var(--accent-color);
            background-color: var(--accent-light);
        }

        .dictation-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .dictation-input {
            width: 100%;
            min-height: 60px;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
        }

        .dictation-input:focus {
            outline: none;
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px var(--accent-light);
        }

        .answer-display {
            margin-top: 10px;
            padding: 10px;
            background-color: rgba(74, 144, 226, 0.1);
            border-radius: 4px;
            font-size: 12px;
            display: none;
        }

        .answer-display.show {
            display: block;
        }

        .sentence-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-top: 20px;
        }

        .nav-btn {
            padding: 8px 16px;
            background-color: var(--accent-light);
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .nav-btn:hover:not(:disabled) {
            background-color: var(--accent-color);
            color: white;
        }

        .nav-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .sentence-counter {
            color: var(--text-secondary);
            font-size: 14px;
            min-width: 60px;
            text-align: center;
        }

        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            background-color: var(--bg-primary);
            border-radius: 8px;
            border-left: 4px solid var(--accent-color);
            margin-bottom: 12px;
        }

        .history-content {
            flex: 1;
        }

        .history-date {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .history-text {
            font-size: 14px;
            color: var(--text-primary);
            word-break: break-word;
        }

        .history-actions {
            display: flex;
            gap: 8px;
            margin-left: 16px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
            background-color: transparent;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            color: var(--text-primary);
            transition: all 0.3s;
        }

        .btn-small:hover {
            background-color: var(--accent-light);
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .blank-input {
            width: 80px;
            padding: 6px;
            margin: 0 4px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            text-align: center;
            font-size: 14px;
        }

        .blank-input:focus {
            outline: none;
            border-color: var(--accent-color);
            background-color: var(--accent-light);
        }

        @media (max-width: 768px) {
            .app-header {
                padding: 15px 20px;
            }

            .app-main {
                padding: 20px;
            }

            .container {
                padding: 20px;
            }

            .history-item {
                flex-direction: column;
                align-items: flex-start;
            }

            .history-actions {
                margin-left: 0;
                margin-top: 12px;
                width: 100%;
            }

            .btn-small {
                flex: 1;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-left">
                <h1>English Learning Platform</h1>
            </div>
            <button class="theme-toggle" id="themeToggle">☀️</button>
        </header>

        <main class="app-main">
            <div class="container" id="inputContainer">
                <div class="container-header">
                    <h2>输入文本</h2>
                </div>

                <textarea id="textInput" class="text-input" placeholder="Paste or type your English text here..."></textarea>

                <div class="controls-row">
                    <div class="control-group">
                        <label>选择音色</label>
                        <select id="voiceGender">
                            <option value="female">女 · Heart</option>
                            <option value="male">男 · Heart</option>
                        </select>
                    </div>
                </div>

                <button class="btn" id="generateBtn" style="width: 100%;">生成音频与字幕</button>
                <div class="status" id="status"></div>
            </div>

            <div class="container player-section" id="playerContainer">
                <div class="player-controls">
                    <button class="play-btn" id="playBtn">▶</button>
                    <div class="progress-container">
                        <div class="time-display">
                            <span id="currentTime">0:00</span> / <span id="duration">0:00</span>
                        </div>
                        <input type="range" min="0" max="100" value="0" class="progress-bar" id="progressBar">
                    </div>
                </div>

                <div class="playback-options">
                    <div class="control-group">
                        <label>播放速度</label>
                        <select id="playbackRate">
                            <option value="0.75">0.75x</option>
                            <option value="1" selected>1x</option>
                            <option value="1.5">1.5x</option>
                            <option value="2">2x</option>
                        </select>
                    </div>
                    <label class="checkbox-label">
                        <input type="checkbox" id="singleLoop">
                        <span>单句循环</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" id="fullLoop">
                        <span>整体循环</span>
                    </label>
                </div>

                <div class="mode-tabs">
                    <button class="mode-tab active" data-mode="subtitle">字幕</button>
                    <button class="mode-tab" data-mode="dictation">听写</button>
                    <button class="mode-tab" data-mode="create-blank">创建填空</button>
                    <button class="mode-tab" data-mode="blank-practice">填空练习</button>
                </div>

                <div class="display-content" id="displayContent"></div>

                <div class="sentence-nav">
                    <button class="nav-btn" id="prevBtn">← 上一句</button>
                    <span class="sentence-counter"><span id="currentIndex">0</span> / <span id="totalSentences">0</span></span>
                    <button class="nav-btn" id="nextBtn">下一句 →</button>
                </div>

                <button class="btn btn-secondary" id="backBtn" style="width: 100%; margin-top: 20px;">← 返回</button>
            </div>

            <div class="container">
                <div class="container-header">
                    <h2>Learning History</h2>
                </div>
                <div id="historyContent">
                    <div class="empty-state">No learning records yet</div>
                </div>
            </div>
        </main>
    </div>

    <audio id="audioElement"></audio>

    <script>
        const state = {
            isDarkMode: localStorage.getItem('darkMode') === 'true',
            sentences: [],
            currentSentenceIndex: 0,
            currentMode: 'subtitle',
            selectedWords: new Set(),
            dictationAnswers: {},
            history: JSON.parse(localStorage.getItem('learningHistory')) || []
        }

        const elements = {
            themeToggle: document.getElementById('themeToggle'),
            generateBtn: document.getElementById('generateBtn'),
            textInput: document.getElementById('textInput'),
            status: document.getElementById('status'),
            playerContainer: document.getElementById('playerContainer'),
            playBtn: document.getElementById('playBtn'),
            progressBar: document.getElementById('progressBar'),
            audio: document.getElementById('audioElement'),
            currentTime: document.getElementById('currentTime'),
            duration: document.getElementById('duration'),
            displayContent: document.getElementById('displayContent'),
            backBtn: document.getElementById('backBtn'),
            historyContent: document.getElementById('historyContent'),
            modeTabs: document.querySelectorAll('.mode-tab'),
            playbackRate: document.getElementById('playbackRate'),
            prevBtn: document.getElementById('prevBtn'),
            nextBtn: document.getElementById('nextBtn')
        }

        function initTheme() {
            if (state.isDarkMode) {
                document.documentElement.classList.add('dark')
                elements.themeToggle.textContent = '🌙'
            } else {
                document.documentElement.classList.remove('dark')
                elements.themeToggle.textContent = '☀️'
            }
        }

        elements.themeToggle.addEventListener('click', () => {
            state.isDarkMode = !state.isDarkMode
            localStorage.setItem('darkMode', state.isDarkMode)
            initTheme()
        })

        function showStatus(msg, type = '') {
            elements.status.textContent = msg
            elements.status.className = 'status'
            if (type) elements.status.classList.add(type)
        }

        function formatTime(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00'
            const mins = Math.floor(seconds / 60)
            const secs = Math.floor(seconds % 60)
            return `${mins}:${secs.toString().padStart(2, '0')}`
        }

        function splitSentences(text) {
            return text.split(/([.!?])/g).reduce((acc, curr, i, arr) => {
                if (i % 2 === 0 && curr.trim()) {
                    acc.push(curr.trim() + (arr[i + 1] || ''))
                }
                return acc
            }, []).filter(s => s.trim().length > 0)
        }

        async function generateAudio(text, gender) {
            try {
                showStatus('正在生成音频...', 'loading')
                
                // 使用浏览器内置 Web Speech API
                const utterance = new SpeechSynthesisUtterance(text)
                utterance.lang = 'en-US'
                utterance.pitch = gender === 'female' ? 1.2 : 0.8
                utterance.rate = 0.9
                utterance.volume = 1

                // 创建虚拟音频
                const offlineCtx = new OfflineAudioContext(2, 44100 * 30, 44100)
                const silentBuffer = offlineCtx.createBuffer(2, 44100 * 30, 44100)
                
                speechSynthesis.cancel()
                speechSynthesis.speak(utterance)

                showStatus('音频已准备好！', 'success')
                return true
            } catch (error) {
                showStatus('音频生成出错，使用文字模式', 'error')
                console.error(error)
                return false
            }
        }

        elements.generateBtn.addEventListener('click', async () => {
            const text = elements.textInput.value.trim()
            if (!text) {
                showStatus('请输入英文文本', 'error')
                return
            }

            state.sentences = splitSentences(text)
            state.currentSentenceIndex = 0
            state.selectedWords.clear()
            state.dictationAnswers = {}

            document.getElementById('totalSentences').textContent = state.sentences.length
            document.getElementById('currentIndex').textContent = '1'

            await generateAudio(text, document.getElementById('voiceGender').value)

            document.getElementById('inputContainer').style.display = 'none'
            elements.playerContainer.classList.add('active')

            saveToHistory(text)
            updateDisplay()
        })

        function updateDisplay() {
            const sentence = state.sentences[state.currentSentenceIndex]
            
            switch (state.currentMode) {
                case 'subtitle':
                    elements.displayContent.innerHTML = `<div class="sentence-text">${sentence}</div>`
                    break
                case 'dictation':
                    renderDictation()
                    break
                case 'create-blank':
                    renderCreateBlank(sentence)
                    break
                case 'blank-practice':
                    renderBlankPractice()
                    break
            }
        }

        function renderDictation() {
            elements.displayContent.innerHTML = state.sentences.map((sent, idx) => `
                <div class="dictation-item ${idx === state.currentSentenceIndex ? 'current' : ''}">
                    <div class="dictation-label">第 ${idx + 1} 句听写...</div>
                    <textarea class="dictation-input" data-index="${idx}" placeholder="Listen and type...">${state.dictationAnswers[idx] || ''}</textarea>
                    <div class="answer-display ${idx === state.currentSentenceIndex ? 'show' : ''}">
                        <strong>参考答案：</strong> ${sent}
                    </div>
                </div>
            `).join('')

            document.querySelectorAll('.dictation-input').forEach(input => {
                input.addEventListener('input', (e) => {
                    state.dictationAnswers[parseInt(e.target.dataset.index)] = e.target.value
                })
            })
        }

        function renderCreateBlank(sentence) {
            const words = sentence.split(/\s+/)
            elements.displayContent.innerHTML = `
                <div style="font-size: 16px; line-height: 2; margin-bottom: 20px;">
                    ${words.map((word, idx) => `
                        <span class="word-item ${state.selectedWords.has(idx) ? 'selected' : ''}" 
                              onclick="toggleWord(${idx})">${word}</span>
                    `).join(' ')}
                </div>
                <button class="btn btn-success" onclick="generateBlankPractice()" style="width: 100%; margin-top: 20px;">
                    生成填空练习
                </button>
            `
        }

        function renderBlankPractice() {
            const sentence = state.sentences[state.currentSentenceIndex]
            const words = sentence.split(/\s+/)
            let html = '<div style="font-size: 16px; line-height: 2; margin-bottom: 20px;">'
            
            words.forEach((word, idx) => {
                if (state.selectedWords.has(idx)) {
                    html += `<input type="text" class="blank-input" placeholder="___" data-index="${idx}" data-answer="${word}">`
                } else {
                    html += `<span>${word}</span>`
                }
                html += ' '
            })
            
            html += '</div><button class="btn btn-success" onclick="submitBlank()" style="width: 100%; margin-top: 20px;">提交</button>'
            elements.displayContent.innerHTML = html
        }

        window.toggleWord = (idx) => {
            state.selectedWords.has(idx) ? state.selectedWords.delete(idx) : state.selectedWords.add(idx)
            renderCreateBlank(state.sentences[state.currentSentenceIndex])
        }

        window.generateBlankPractice = () => {
            if (state.selectedWords.size === 0) {
                alert('请先选择要挖空的单词')
                return
            }
            state.currentMode = 'blank-practice'
            elements.modeTabs.forEach(t => t.classList.toggle('active', t.dataset.mode === 'blank-practice'))
            renderBlankPractice()
        }

        window.submitBlank = () => {
            const inputs = document.querySelectorAll('.blank-input')
            let correct = 0
            
            inputs.forEach(input => {
                const answer = input.dataset.answer.toLowerCase()
                const value = input.value.toLowerCase().trim()
                input.style.backgroundColor = value === answer ? 'rgba(39, 174, 96, 0.3)' : 'rgba(231, 76, 60, 0.3)'
                if (value === answer) correct++
            })
            alert(`您答对了 ${correct}/${inputs.length} 个`)
        }

        elements.modeTabs.forEach(tab => {
            tab.addEventListener('click', () => {
                elements.modeTabs.forEach(t => t.classList.remove('active'))
                tab.classList.add('active')
                state.currentMode = tab.dataset.mode
                updateDisplay()
            })
        })

        elements.playBtn.addEventListener('click', () => {
            const utterances = state.sentences.map(s => {
                const u = new SpeechSynthesisUtterance(s)
                u.lang = 'en-US'
                u.pitch = 1
                u.rate = parseFloat(elements.playbackRate.value)
                return u
            })

            if (elements.playBtn.textContent === '▶') {
                elements.playBtn.textContent = '⏸'
                utterances.forEach(u => speechSynthesis.speak(u))
            } else {
                elements.playBtn.textContent = '▶'
                speechSynthesis.cancel()
            }
        })

        elements.progressBar.addEventListener('input', (e) => {
            const idx = Math.floor((e.target.value / 100) * state.sentences.length)
            if (idx < state.sentences.length) {
                state.currentSentenceIndex = idx
                updateSentenceDisplay()
            }
        })

        elements.prevBtn.addEventListener('click', () => {
            if (state.currentSentenceIndex > 0) {
                state.currentSentenceIndex--
                updateSentenceDisplay()
            }
        })

        elements.nextBtn.addEventListener('click', () => {
            if (state.currentSentenceIndex < state.sentences.length - 1) {
                state.currentSentenceIndex++
                updateSentenceDisplay()
            }
        })

        function updateSentenceDisplay() {
            document.getElementById('currentIndex').textContent = state.currentSentenceIndex + 1
            elements.prevBtn.disabled = state.currentSentenceIndex === 0
            elements.nextBtn.disabled = state.currentSentenceIndex === state.sentences.length - 1
            updateDisplay()
        }

        elements.backBtn.addEventListener('click', () => {
            document.getElementById('inputContainer').style.display = 'block'
            elements.playerContainer.classList.remove('active')
            speechSynthesis.cancel()
            elements.playBtn.textContent = '▶'
        })

        function saveToHistory(text) {
            const record = {
                id: Date.now(),
                timestamp: new Date().toLocaleString(),
                text: text.slice(0, 80) + (text.length > 80 ? '...' : ''),
                fullText: text
            }
            state.history.unshift(record)
            localStorage.setItem('learningHistory', JSON.stringify(state.history))
            renderHistory()
        }

        function renderHistory() {
            if (!state.history.length) {
                elements.historyContent.innerHTML = '<div class="empty-state">No learning records yet</div>'
                return
            }
            elements.historyContent.innerHTML = state.history.map(r => `
                <div class="history-item">
                    <div class="history-content">
                        <div class="history-date">${r.timestamp}</div>
                        <div class="history-text">${r.text}</div>
                    </div>
                    <div class="history-actions">
                        <button class="btn-small" onclick="loadHistory(${r.id})">载入</button>
                        <button class="btn-small" onclick="downloadHistory(${r.id})">下载</button>
                        <button class="btn-small" onclick="deleteHistory(${r.id})">删除</button>
                    </div>
                </div>
            `).join('')
        }

        window.loadHistory = (id) => {
            const r = state.history.find(h => h.id === id)
            if (r) {
                elements.textInput.value = r.fullText
                elements.generateBtn.click()
            }
        }

        window.downloadHistory = (id) => {
            const r = state.history.find(h => h.id === id)
            if (r) {
                const blob = new Blob([r.fullText], { type: 'text/plain' })
                const url = URL.createObjectURL(blob)
                const a = document.createElement('a')
                a.href = url
                a.download = `learning-${id}.txt`
                a.click()
            }
        }

        window.deleteHistory = (id) => {
            state.history = state.history.filter(h => h.id !== id)
            localStorage.setItem('learningHistory', JSON.stringify(state.history))
            renderHistory()
        }

        initTheme()
        renderHistory()
    </script>
</body>
</html>
